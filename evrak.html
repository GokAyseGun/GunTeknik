<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Gün Teknik — Evrak Takibi</title>
<style>




:root{
  /* ── AIROFIT / GÜN TEKNİK DARK PALETTE ── */
  --bg:#060606;--bg2:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;
  --border:#252525;--border2:#333333;
  --text:#f0f0f0;--text2:#b0b0b0;--text3:#707070;

  /* Ana aksan: Magenta */
  --mg:#E8197A;--mg-lt:rgba(232,25,122,0.10);--mg-md:rgba(232,25,122,0.22);
  --mg-glow:0 0 30px rgba(232,25,122,0.35);
  /* İkinci aksan: Cyan */
  --cy:#00E5FF;--cy-lt:rgba(0,229,255,0.08);--cy-md:rgba(0,229,255,0.20);
  --cy-glow:0 0 30px rgba(0,229,255,0.25);
  /* Diğer renkler */
  --green:#00E676;--green-lt:rgba(0,230,118,0.10);--green-glow:0 0 20px rgba(0,230,118,0.2);
  --red:#FF1744;--red-lt:rgba(255,23,68,0.10);
  --amber:#FFAB00;--amber-lt:rgba(255,171,0,0.10);
  --purple:#7C4DFF;--purple-lt:rgba(124,77,255,0.10);
  --teal:#00E5FF;--teal-lt:rgba(0,229,255,0.08);

  /* Eski --blue referansları için alias (geriye dönük uyum) */
  --blue:#00E5FF;--blue-lt:rgba(0,229,255,0.08);--blue-md:rgba(0,229,255,0.20);

  /* Gradients */
  --gmg:linear-gradient(135deg,#FF2D8A,#9B10A0);
  --gcy:linear-gradient(135deg,#00B4D8,#00E5FF);
  --grad-main:linear-gradient(135deg,#FF2D8A,#9B10A0);
  --grad-success:linear-gradient(135deg,#00E676,#00E5FF);
  --grad-danger:linear-gradient(135deg,#FF1744,#FF6D00);
  --grad-amber:linear-gradient(135deg,#FFAB00,#FF6D00);

  /* Gradient accent text */
  --grad-text-mg:linear-gradient(135deg,#FF2D8A 0%,#C4006A 60%,#FF6EC7 100%);
  --grad-text-cy:linear-gradient(135deg,#00B4D8 0%,#00E5FF 60%,#80F4FF 100%);

  /* Fonts */
  --fd:'Barlow Condensed',system-ui,sans-serif;
  --fu:'Inter',system-ui,sans-serif;
  --fm:'JetBrains Mono',monospace;

  /* Radius */
  --r-xs:6px;--r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;--r-full:9999px;

  /* Shadows */
  --shadow-sm:0 2px 8px rgba(0,0,0,0.5);
  --shadow-md:0 8px 32px rgba(0,0,0,0.6);
  --shadow-lg:0 20px 60px rgba(0,0,0,0.7);
  --shadow-mg:0 0 40px rgba(232,25,122,0.14);
  --shadow-cy:0 0 40px rgba(0,229,255,0.10);

  --nav-h:68px;--top-h:60px;
  --ease:cubic-bezier(0.16,1,0.3,1);--ease-back:cubic-bezier(0.34,1.56,0.64,1);
}
/* Açık tema */
[data-tema="acik"]{
  --bg:#f0f0f8;--bg2:#e8e8f4;--surface:#ffffff;--surface2:#f4f4fc;
  --border:#e0e0ea;--border2:#d0d0e0;
  --text:#080812;--text2:#505070;--text3:#9090aa;
  --mg:#C4006A;--mg-lt:rgba(196,0,106,0.08);--mg-md:rgba(196,0,106,0.18);
  --cy:#0090B0;--cy-lt:rgba(0,144,176,0.08);--cy-md:rgba(0,144,176,0.18);
  --blue:#0090B0;--blue-lt:rgba(0,144,176,0.08);--blue-md:rgba(0,144,176,0.18);
  --green:#00875A;--green-lt:rgba(0,135,90,0.08);
  --red:#D50032;--red-lt:rgba(213,0,50,0.08);
  --amber:#B06000;--amber-lt:rgba(176,96,0,0.08);
  --purple:#5500CC;--purple-lt:rgba(85,0,204,0.08);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.08);--shadow-md:0 8px 24px rgba(0,0,0,0.12);--shadow-lg:0 20px 50px rgba(0,0,0,0.18);
  --shadow-mg:0 0 30px rgba(196,0,106,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;-webkit-font-smoothing:antialiased;background:var(--bg);}
body{overscroll-behavior-y:none;background:transparent;color:var(--text);font-family:var(--fu);font-size:14px;line-height:1.6;overflow-x:hidden;height:100%;transition:background 0.3s,color 0.3s;}
button{border:none;cursor:pointer;font-family:inherit;background:transparent;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}
.num{font-family:var(--fm);font-variant-numeric:tabular-nums;letter-spacing:-0.4px;}

/* Gradient accent text */
.amg{background:var(--grad-text-mg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.acy{background:var(--grad-text-cy);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Ripple */
.rip{position:relative;overflow:hidden;}
.rip .rp{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,0.12);transform:scale(0);animation:rp 0.65s cubic-bezier(0.16,1,0.3,1) forwards;}
@keyframes rp{to{transform:scale(4);opacity:0;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.88) translateY(24px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes ping{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes shimmer{from{background-position:-400px 0;}to{background-position:400px 0;}}
@keyframes pageIn{from{opacity:0;transform:translateY(28px) scale(0.98);filter:blur(3px);}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}
@keyframes staggerIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:scale(0.86) translateY(30px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* DESEN GİRİŞ EKRANI */
#desen-screen{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;padding:32px 24px;animation:fadeIn 0.4s var(--ease);}
#desen-screen.active{display:flex;}
#parmak-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;padding:32px 24px;animation:fadeIn 0.4s var(--ease);}
#parmak-screen.active{display:flex;}
.parmak-icon{width:90px;height:90px;border-radius:50%;background:var(--blue-lt);border:2px solid var(--blue-md);display:flex;align-items:center;justify-content:center;font-size:42px;margin:8px 0 20px;animation:parmakPulse 1.8s ease-in-out infinite;}
@keyframes parmakPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.desen-baslik{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center;}
.desen-alt{font-size:13px;color:var(--text3);margin-bottom:32px;text-align:center;}
.desen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-bottom:28px;position:relative;}
.desen-nokta-wrap{display:flex;align-items:center;justify-content:center;width:56px;height:56px;}
.desen-nokta{width:18px;height:18px;border-radius:50%;background:var(--border2);border:2px solid var(--border2);transition:all 0.2s var(--ease);cursor:pointer;position:relative;z-index:2;}
.desen-nokta.secili{background:var(--blue);border-color:var(--blue);transform:scale(1.3);box-shadow:0 0 0 6px var(--blue-lt);}
.desen-nokta.yanlis{background:var(--red);border-color:var(--red);box-shadow:0 0 0 6px var(--red-lt);}
.desen-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.desen-durum{font-size:13px;color:var(--text2);text-align:center;min-height:20px;margin-bottom:16px;}
.desen-haklar{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.desen-hak{width:8px;height:8px;border-radius:50%;background:var(--border2);}
.desen-hak.yanlis{background:var(--red);}

/* İSİM ALANLARI — her kelimenin ilk harfi büyük */
input.isim-input{text-transform:capitalize;}
/* TUTAR ALANLARI */
.tutar-wrap{position:relative;display:flex;align-items:center;}
.tutar-wrap input{padding-right:28px!important;text-align:right;}
.tutar-wrap .tl-simge{position:absolute;right:12px;font-size:14px;color:var(--text3);pointer-events:none;font-weight:500;}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + 20px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:14px 24px;border-radius:var(--r-xl);border:1px solid var(--border2);box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;z-index:99999;opacity:0;pointer-events:none;transition:all 0.5s var(--ease);max-width:90vw;text-align:center;display:flex;align-items:center;gap:10px;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast .toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:99998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.loader{width:40px;height:40px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--mg);animation:spin 0.8s linear infinite;}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite;border-radius:var(--r-sm);}
.skel-card{height:64px;border-radius:var(--r-md);margin-bottom:8px;}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn 0.6s var(--ease);}
.auth-box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:44px 36px;box-shadow:var(--shadow-lg);animation:scaleIn 0.7s var(--ease);}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo-icon{width:56px;height:56px;border-radius:var(--r-md);background:var(--blue-lt);border:1px solid var(--blue-md);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;}
.auth-logo h1{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.auth-logo p{font-size:12px;color:var(--text3);margin-top:4px;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.auth-field input{width:100%;padding:14px 16px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:all 0.4s var(--ease);}
.auth-field input:focus{border-color:var(--mg-md);box-shadow:0 0 0 3px var(--mg-lt);}
.auth-err{font-size:12px;color:var(--red);margin-top:4px;min-height:18px;}
.auth-attempts{font-size:11px;color:var(--amber);text-align:center;margin-bottom:12px;min-height:16px;}
.btn-auth{width:100%;padding:15px;border-radius:var(--r-sm);background:var(--gmg);color:white;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.4s var(--ease);border:none;margin-top:8px;}
.btn-auth:active{transform:scale(0.97);}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed;}

/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden;}
#app.active{display:flex;}
.topbar{height:var(--top-h);flex-shrink:0;background:rgba(6,6,6,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:100;}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.4px;color:var(--text);}
.topbar-actions{display:flex;align-items:center;gap:6px;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
.icon-btn{width:38px;height:38px;border-radius:var(--r-sm);background:transparent;border:1px solid transparent;color:var(--text2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s var(--ease);}
.icon-btn-sm{width:28px;height:28px;border-radius:var(--r-sm);background:transparent;border:none;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:all 0.2s var(--ease);flex-shrink:0;}
.icon-btn-sm:hover{background:var(--bg2);}
.star-btn-sm{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text3);border:none;background:transparent;padding:0;flex-shrink:0;transition:color 0.2s;}
.star-btn-sm.active{color:var(--amber);}
.star-btn-sm:hover{color:var(--amber);}
.icon-btn:hover{background:var(--surface);border-color:var(--border);color:var(--text);}
.icon-btn:active{transform:scale(0.9);}
input[type="month"].month-input{padding:7px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;width:130px;outline:none;font-family:inherit;transition:all 0.3s var(--ease);}
input[type="month"].month-input:focus{border-color:var(--blue);}
.content{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;padding-bottom:calc(var(--nav-h) + 80px);}
.page{display:none;padding:20px 16px;}
.page.active{display:block;}
#page-rehber{padding:0;}
#page-rehber.active{
  display:flex;
  flex-direction:column;
  height:calc(var(--vh,100vh) - var(--top-h,60px) - var(--nav-h,68px));
  overflow:hidden;
}

/* BOTTOM NAV */
.bottom-nav{height:var(--nav-h);flex-shrink:0;background:rgba(6,6,6,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 4px;padding-bottom:env(safe-area-inset-bottom);position:fixed;bottom:0;left:0;right:0;z-index:100;overflow-x:auto;scrollbar-width:none;}
.bottom-nav::-webkit-scrollbar{display:none;}
.nav-item{flex:0 0 auto;min-width:56px;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;border-radius:var(--r-md);transition:all 0.4s var(--ease);position:relative;}
.nav-item .nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.3s var(--ease),filter 0.3s var(--ease);}
.nav-icon svg{width:20px;height:20px;}
.nav-item.active{color:var(--mg);}
.nav-item.active .nav-icon{transform:translateY(-3px) scale(1.15);filter:drop-shadow(0 0 6px var(--mg));}
.nav-item:active .nav-icon{transform:scale(0.85);}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px 2px;display:flex;align-items:center;gap:10px;font-family:var(--fd);}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-title.mt0{margin-top:0;}

/* KARTLAR */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.cards-1{grid-template-columns:1fr;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;transition:transform 0.3s var(--ease),box-shadow 0.3s var(--ease),border-color 0.3s var(--ease);cursor:pointer;}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background 0.3s var(--ease),opacity 0.3s;border-radius:var(--r-lg) var(--r-lg) 0 0;opacity:0;}
.card:hover::before{background:var(--gmg);opacity:1;}
.card.accent-green::before{background:var(--grad-success);opacity:1;}
.card.accent-red::before{background:var(--grad-danger);opacity:1;}
.card.accent-blue::before{background:var(--gmg);opacity:1;}
.card.accent-amber::before{background:var(--grad-amber);opacity:1;}
/* Stat card — Airofit tarzı glow */
.card.stat-mg{background:linear-gradient(145deg,#150410,#220715);border:1px solid rgba(232,25,122,0.25);box-shadow:var(--shadow-mg);}
.card.stat-mg::after{content:'';position:absolute;width:120px;height:120px;border-radius:50%;top:-30px;right:-30px;filter:blur(35px);background:rgba(232,25,122,0.12);pointer-events:none;}
.card.stat-cy{background:linear-gradient(145deg,#001020,#00172a);border:1px solid rgba(0,229,255,0.20);box-shadow:var(--shadow-cy);}
.card.stat-cy::after{content:'';position:absolute;width:120px;height:120px;border-radius:50%;top:-30px;right:-30px;filter:blur(35px);background:rgba(0,229,255,0.09);pointer-events:none;}
/* AI butonu için overflow clip — sadece kart içeriği kesilsin, ::before değil */
.card .ai-abs-btn{position:absolute;top:8px;right:8px;background:rgba(124,77,255,0.18);border:none;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--purple);z-index:2;transition:background 0.2s;}
.card .ai-abs-btn:hover{background:rgba(124,77,255,0.32);}
.card .lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:8px;letter-spacing:0.3px;}
.card .val{font-size:22px;font-weight:700;letter-spacing:-0.8px;font-family:var(--fm);color:var(--text);}

/* STAGGER LİSTE */
.stagger-wrap{display:flex;flex-direction:column;gap:8px;}
.stagger-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;opacity:0;animation:staggerIn 0.18s var(--ease) forwards;transition:transform 0.3s var(--ease),box-shadow 0.3s var(--ease),border-color 0.3s var(--ease);cursor:pointer;position:relative;overflow:hidden;}
.stagger-item:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm);border-color:var(--border2);}

/* STOK SATIRI — ince */
.stok-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r-sm);border:1px solid var(--border);opacity:0;animation:staggerIn 0.5s var(--ease) forwards;transition:all 0.3s var(--ease);}
.stok-row:hover{border-color:var(--border2);}
.stok-row.kritik{background:rgba(240,196,114,0.08);border-color:rgba(240,196,114,0.3);}
.stok-row.bitti{background:rgba(232,128,128,0.08);border-color:rgba(232,128,128,0.3);}

/* RENK YARDIMCI */
.c-blue{color:var(--blue);}.c-green{color:var(--green);}.c-red{color:var(--red);}
.c-amber{color:var(--amber);}.c-purple{color:var(--purple);}.c-teal{color:var(--teal);}.c-muted{color:var(--text2);}
.bg-blue{background:var(--blue-lt);color:var(--blue);}.bg-green{background:var(--green-lt);color:var(--green);}
.bg-red{background:var(--red-lt);color:var(--red);}.bg-amber{background:var(--amber-lt);color:var(--amber);}
.bg-purple{background:var(--purple-lt);color:var(--purple);}.bg-teal{background:var(--teal-lt);color:var(--teal);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.id-badge{font-size:10px;font-weight:600;background:rgba(255,255,255,0.07);color:var(--text2);padding:3px 8px;border-radius:8px;margin-left:6px;letter-spacing:0.3px;}

/* FORMLAR */
.fg{display:flex;flex-direction:column;gap:14px;}
.fi{display:flex;flex-direction:column;gap:6px;}
.fi label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;}
.fi input:not([type="checkbox"]):not([type="radio"]):not([type="file"]),.fi select,.fi textarea{padding:13px 15px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--bg2);color:var(--text);font-size:14px;outline:none;width:100%;transition:all 0.4s var(--ease);appearance:none;}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--mg-md);background:var(--bg);box-shadow:0 0 0 3px var(--mg-lt);}
.fi select option{background:var(--surface);}
.pay-method-btns{display:flex;gap:8px;}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:99990;display:none;align-items:center;justify-content:center;flex-direction:column;gap:0;padding:60px 16px 80px;}

function periyotAcikla(tur, bas, bit) {
  if(!bas||!bit)return '—';
  if(tur==='Günlük')return 'Hizmet günü';
  if(tur==='Haftalık')return 'Her hafta '+bas+' - '+bit+' arasi';
  if(tur==='Aylık')return 'Her ayin '+bas+'. - '+bit+'. gunleri arasi';
  if(tur==='Sezonluk'||tur==='Yıllık'){
    const [ba,bg]=bas.split('-'); const [bia,big]=bit.split('-');
    const AYLAR2=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
    return (AYLAR2[parseInt(ba)-1]||ba)+' '+bg+' - '+(AYLAR2[parseInt(bia)-1]||bia)+' '+big;
  }
  return bas+' - '+bit;
}
function odemeBekleniyor(tur, bas, bit) {
  const bugun=new Date();
  const gun=bugun.getDate();
  const ay=bugun.getMonth()+1;
  const haftaGunu=bugun.getDay()||7; // 1=Pt, 7=Pz

  if(tur==='Günlük')return true;
  if(tur==='Haftalık'){
    const HAFTA_MAP={'Pazartesi':1,'Salı':2,'Çarşamba':3,'Perşembe':4,'Cuma':5,'Cumartesi':6,'Pazar':7};
    const b=HAFTA_MAP[bas]||1, bi=HAFTA_MAP[bit]||7;
    return haftaGunu>=b&&haftaGunu<=bi;
  }
  if(tur==='Aylık'){
    return gun>=parseInt(bas)&&gun<=parseInt(bit);
  }
  if(tur==='Sezonluk'||tur==='Yıllık'){
    const [ba,bg]=bas.split('-'); const [bia,big]=bit.split('-');
    const basTs=new Date(bugun.getFullYear(),parseInt(ba)-1,parseInt(bg));
    const bitTs=new Date(bugun.getFullYear(),parseInt(bia)-1,parseInt(big));
    return bugun>=basTs&&bugun<=bitTs;
  }
  return false;
}
function odemeGecti(tur, bit) {
  const bugun=new Date();
  const gun=bugun.getDate();
  const ay=bugun.getMonth()+1;
  const haftaGunu=bugun.getDay()||7;

  if(tur==='Günlük')return false;
  if(tur==='Haftalık'){
    const HAFTA_MAP={'Pazartesi':1,'Salı':2,'Çarşamba':3,'Perşembe':4,'Cuma':5,'Cumartesi':6,'Pazar':7};
    return haftaGunu>=(HAFTA_MAP[bit]||7)+1;
  }
  if(tur==='Aylık') return gun>parseInt(bit);
  if(tur==='Sezonluk'||tur==='Yıllık'){
    const [bia,big]=bit.split('-');
    const bitTs=new Date(bugun.getFullYear(),parseInt(bia)-1,parseInt(big));
    return bugun>bitTs;
  }
  return false;
}

async function gorselSikistir(file){
  if(!file.type.startsWith('image/'))return file;
  return new Promise(resolve=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        if(!blob){resolve(file);return;}
        resolve(blob.size<file.size?new File([blob],file.name,{type:'image/jpeg'}):file);
      },'image/jpeg',0.75);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

function evrakDurum(e){
  const dongu=e.odeme_dongusu||'Yok';
  const bas=e.periyot_bas||'';const bit=e.periyot_bit||'';
  if(dongu==='Yok'||!bas||!bit)return{durum:'yok',renk:'var(--text3)',metin:'Tek Seferlik'};
  const bugun=new Date();
  const buDonemOdendi=DB.odemeler.filter(o=>String(o.evrak_id)===String(e.id)).some(o=>{
    const od=new Date(o.odeme_tarihi+'T12:00');
    if(dongu==='Aylık')return od.getFullYear()===bugun.getFullYear()&&od.getMonth()===bugun.getMonth();
    if(dongu==='Yıllık')return od.getFullYear()===bugun.getFullYear();
    if(dongu==='Haftalık')return Math.abs(bugun-od)/86400000<=7;
    return false;
  });
  if(buDonemOdendi)return{durum:'odendi',renk:'var(--green)',metin:'Bu dönem ödendi ✓'};
  if(odemeGecti(dongu,bit))return{durum:'gecikti',renk:'var(--red)',metin:'❗ Son ödeme tarihi geçti!'};
  if(odemeBekleniyor(dongu,bas,bit))return{durum:'bekleniyor',renk:'var(--amber)',metin:'⏳ Ödeme bekleniyor'};
  return{durum:'bekle',renk:'var(--text3)',metin:'Henüz dönem gelmedi'};
}

function evrakAdi(e){
  if(e.tur==='Fatura')return 'Fatura'+(e.alt_tur?' - '+e.alt_tur:'');
  if(e.tur==='Araç')return 'Araç'+(e.alt_tur?' - '+e.alt_tur:'');
  return e.tur||'Evrak';
}

function evrakDetayAc(id){
  _seciliEvrakId=id;
  const e=DB.evraklar.find(x=>x.id===id);if(!e)return;
  const adi=evrakAdi(e);
  const kisi=DB.kisiler.find(k=>String(k.id)===String(e.kisi_id));
  document.getElementById('evrak-detay-baslik').textContent='📄 '+adi;
  document.getElementById('evrak-detay-bilgi').textContent=[
    kisi?.isim||kisi?.firma_unvan||'',
    (e.odeme_dongusu&&e.odeme_dongusu!=='Yok'&&e.periyot_bas)?e.odeme_dongusu+' · '+periyotAcikla(e.odeme_dongusu,e.periyot_bas,e.periyot_bit):''
  ].filter(Boolean).join(' · ');
  const durum=evrakDurum(e);
  const durEl=document.getElementById('evrak-dongu-durum-bilgi');
  if(durEl&&durum.durum!=='yok'){
    const bgMap={gecikti:'var(--red-lt)',bekleniyor:'var(--amber-lt)',odendi:'var(--green-lt)',bekle:'var(--surface2)'};
    durEl.innerHTML='<div style="background:'+(bgMap[durum.durum]||'var(--surface2)')+';border-radius:var(--r-sm);padding:10px 14px;border-left:3px solid '+durum.renk+';margin-bottom:12px;"><div style="font-weight:700;font-size:13px;color:'+durum.renk+';">'+durum.metin+'</div>'+(e.aciklama?'<div style="font-size:12px;color:var(--text3);margin-top:4px;">'+e.aciklama+'</div>':'')+'</div>';
  }else if(durEl)durEl.innerHTML='';
  renderEvrakOdemeGecmis(id);
  openModal('modal-evrak-detay');
}

function renderEvrakOdemeGecmis(evrakId){
  const el=document.getElementById('evrak-odeme-gecmis-liste');if(!el)return;
  const list=DB.odemeler.filter(o=>String(o.evrak_id)===String(evrakId))
    .sort((a,b)=>new Date(b.odeme_tarihi)-new Date(a.odeme_tarihi));
  if(!list.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:16px 0;text-align:center;">Henüz ödeme kaydı yok.</div>';return;}
  el.innerHTML=list.map(o=>{
    const ekSayisi=(DB.ekler||[]).filter(e=>e.kayit_tip==='evrak_odeme'&&String(e.kayit_id)===String(o.id)).length;
    return '<div onclick="evrakOdemeDetayAc('+o.id+')" style="background:var(--surface2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;gap:10px;">'
      +'<div style="flex:1;">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-weight:700;font-size:15px;color:var(--green);">'+fmt(o.tutar)+' '+o.para_birimi+'</span><span style="font-size:12px;color:var(--text3);">'+dtStr(o.odeme_tarihi)+'</span>'+(ekSayisi?'<span style="font-size:11px;color:var(--text3);">📎'+ekSayisi+'</span>':'')+'</div>'
      +(o.notlar?'<div style="font-size:12px;color:var(--text3);margin-top:3px;">'+o.notlar+'</div>':'')
      +'</div>'
      +'<div style="display:flex;gap:4px;">'
      +'<button onclick="event.stopPropagation();evrakOdemeDuzenle('+o.id+')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;">✏️</button>'
      +'<button onclick="event.stopPropagation();evrakOdemeSil('+o.id+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:4px;">🗑</button>'
      +'</div></div>';
  }).join('');
}

function evrakPeriyotDegerAl(){
  const dongu=document.getElementById('evrak-dongu-input')?.value||'Yok';
  if(dongu==='Yok')return{bas:'',bit:''};
  if(dongu==='Aylık')return{bas:document.getElementById('ep-bas')?.value||'1',bit:document.getElementById('ep-bit')?.value||'15'};
  if(dongu==='Haftalık')return{bas:document.getElementById('ep-bas')?.value||'Pazartesi',bit:document.getElementById('ep-bit')?.value||'Cuma'};
  const bA=document.getElementById('ep-bas-ay')?.value||'1',bG=document.getElementById('ep-bas-gun')?.value||'1';
  const biA=document.getElementById('ep-bit-ay')?.value||'1',biG=document.getElementById('ep-bit-gun')?.value||'15';
  return{bas:bA+'-'+bG,bit:biA+'-'+biG};
}

async function evrakKaydet(btn){
  const tur=document.getElementById('evrak-tur-input')?.value||'';
  if(!tur){showToast('Evrak türü seçin','red');return;}
  const editId=document.getElementById('evrak-edit-id')?.value||'';
  if(btn)btn.disabled=true;
  try{
    const p=evrakPeriyotDegerAl();
    const altTur=tur==='Fatura'?document.getElementById('evrak-alt-tur-input')?.value||'':
                 tur==='Araç'?document.getElementById('evrak-arac-alt-input')?.value||'':'';
    const evrakAdi2=tur==='Fatura'&&altTur?tur+' - '+altTur:tur==='Araç'&&altTur?tur+' - '+altTur:tur;
    const payload={
      kisi_id:document.getElementById('evrak-kisi-id')?.value||null,
      tur,alt_tur:altTur,evrak_adi:evrakAdi2,
      odeme_dongusu:document.getElementById('evrak-dongu-input')?.value||'Yok',
      periyot_bas:p.bas,periyot_bit:p.bit,
      aciklama:document.getElementById('evrak-not-input')?.value||'',aktif:true
    };
    if(editId){await sbFetch('sirket_evraklar?id=eq.'+editId,{method:'PATCH',body:JSON.stringify(payload)});}
    else{await sbFetch('sirket_evraklar',{method:'POST',body:JSON.stringify(payload)});}
    showToast(editId?'Güncellendi':'Evrak eklendi','green');
    closeModal('modal-evrak-ekle');await loadAll();
  }catch(e){showToast('Hata: '+e.message,'red');}
  finally{if(btn)btn.disabled=false;}
}

async function evrakSil(id){
  if(!confirm('Bu evrak ve tüm ödeme kayıtları silinecek?'))return;
  try{
    await sbFetch('sirket_evrak_odemeler?evrak_id=eq.'+id,{method:'DELETE'});
    await sbFetch('sirket_evraklar?id=eq.'+id,{method:'DELETE'});
    DB.evraklar=DB.evraklar.filter(e=>e.id!==id);
    DB.odemeler=DB.odemeler.filter(o=>String(o.evrak_id)!==String(id));
    renderAnaListe();showToast('Silindi','amber');
  }catch(e){showToast('Hata','red');}
}

async function evrakOdemeKaydet(btn){
  if(!_seciliEvrakId){showToast('Evrak seçili değil','red');return;}
  const tarih=document.getElementById('evrak-odeme-tarih').value;
  const tutar=parseFloat(document.getElementById('evrak-odeme-tutar').value)||0;
  if(!tarih||!tutar){showToast('Tarih ve tutar girin','red');return;}
  const editId=document.getElementById('evrak-odeme-edit-id').value;
  if(btn)btn.disabled=true;
  try{
    const payload={
      evrak_id:_seciliEvrakId,odeme_tarihi:tarih,tutar,
      para_birimi:document.getElementById('evrak-odeme-pb').value,
      notlar:document.getElementById('evrak-odeme-not').value,
      donem:tarih.slice(0,7)
    };
    let kayitId;
    if(editId){
      await sbFetch('sirket_evrak_odemeler?id=eq.'+editId,{method:'PATCH',body:JSON.stringify(payload)});
      kayitId=parseInt(editId);
    }else{
      const res=await sbFetch('sirket_evrak_odemeler',{method:'POST',prefer:'return=representation',body:JSON.stringify(payload)});
      kayitId=Array.isArray(res)?res[0]?.id:res?.id;
    }
    if(_geciciEkler.length&&kayitId){
      for(const e of _geciciEkler){
        try{
          const sikFile=await gorselSikistir(e.file);
          const url=await sbStorage(sikFile,'sirket_evrak');
          await sbFetch('sirket_ekler',{method:'POST',body:JSON.stringify({
            evrak_odeme_id:kayitId,kayit_tip:'evrak_odeme',kayit_id:kayitId,
            url,dosya_adi:e.file.name,dosya_tipi:e.file.type,dosya_boyut:e.file.size
          })});
        }catch(ex){console.warn('Ek yüklenemedi:',ex);}
      }
    }
    _geciciEkler=[];
    const _islemOlarak=document.getElementById('evrak-islem-olarak')?.checked;
    if(_islemOlarak&&!editId){
      await evrakOdemeErpIslemKaydet(kayitId,tutar,
        document.getElementById('evrak-odeme-pb').value,
        document.getElementById('evrak-odeme-not').value,tarih);
    }
    showToast(editId?'Güncellendi':(_islemOlarak?'Ödeme ve ERP işlemi kaydedildi':'Ödeme kaydedildi'),'green');
    closeModal('modal-evrak-odeme-ekle');
    await loadAll();
    renderEvrakOdemeGecmis(_seciliEvrakId);
  }catch(e){showToast('Hata: '+e.message,'red');}
  finally{if(btn)btn.disabled=false;}
}

async function evrakOdemeSil(id){
  if(!confirm('Bu ödeme kaydı silinecek?'))return;
  try{
    await sbFetch('sirket_evrak_odemeler?id=eq.'+id,{method:'DELETE'});
    DB.odemeler=DB.odemeler.filter(o=>o.id!==id);
    renderEvrakOdemeGecmis(_seciliEvrakId);renderAnaListe();
    showToast('Silindi','amber');

}

// ════ BİLDİRİM ════
async function evrakBildirimKontrol(){try{
  const bugun=new Date();
  for(const e of DB.evraklar){
    const dongu=e.odeme_dongusu||'Yok';const bas=e.periyot_bas||'';const bit=e.periyot_bit||'';
    if(dongu==='Yok'||!bas||!bit)continue;
    const buDonemOdendi=DB.odemeler.filter(o=>String(o.evrak_id)===String(e.id)).some(o=>{
      const od=new Date(o.odeme_tarihi+'T12:00');
      if(dongu==='Aylık')return od.getFullYear()===bugun.getFullYear()&&od.getMonth()===bugun.getMonth();
      if(dongu==='Yıllık')return od.getFullYear()===bugun.getFullYear();
      return false;
    });
    if(buDonemOdendi)continue;
    const bekleniyor=odemeBekleniyor(dongu,bas,bit);
    const gecti=odemeGecti(dongu,bit);
    if(!bekleniyor&&!gecti)continue;
    const adi=evrakAdi(e);
    const mesaj=gecti?adi+' - Son ödeme tarihi geçti!':adi+' - Ödeme bekleniyor';
    const tip=gecti?'hata':'uyari';
    try{
      const var_=await sbFetch('sistem_bildirimleri?mesaj=eq.'+encodeURIComponent(mesaj)+'&limit=1').catch(()=>[]);
      if(!var_||!var_.length){await sbFetch('sistem_bildirimleri',{method:'POST',body:JSON.stringify({baslik:mesaj.slice(0,60),mesaj,tip})}).catch(()=>{});}
    }catch(ex){}
  }
  try{
    const okunmamis=await sbFetch('sistem_bildirimleri?okundu=eq.false').catch(()=>[]);
    const badge=document.getElementById('bil-badge');
    if(badge&&okunmamis?.length){badge.style.display='block';badge.textContent=okunmamis.length>9?'9+':okunmamis.length;}
    else if(badge)badge.style.display='none';
  }catch(ex){}
}catch(e){console.warn('Bildirim kontrol hatası:',e);}}

async function bildirimAc(){
  try{
    const list=await sbFetch('sistem_bildirimleri?order=created_at.desc&limit=50').catch(()=>[]);
    const el=document.getElementById('bildirimler-liste');if(!el)return;
    if(!list||!list.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);">Bildirim yok</div>';}
    else{
      el.innerHTML=list.map(b=>'<div style="background:var(--surface2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:6px;border-left:3px solid '+(b.okundu?'var(--border)':b.tip==='hata'?'var(--red)':'var(--amber)')+'">'
        +'<div style="font-size:13px;font-weight:'+(b.okundu?'400':'600')+';">'+b.mesaj+'</div>'
        +'<div style="font-size:11px;color:var(--text3);margin-top:3px;">'+dtStr(b.tarih||b.created_at)+'</div>'
        +'</div>').join('');
      await sbFetch('sistem_bildirimleri?okundu=eq.false',{method:'PATCH',body:JSON.stringify({okundu:true})}).catch(()=>{});
      const badge=document.getElementById('bil-badge');if(badge)badge.style.display='none';
    }
    openModal('modal-bildirimler');
  }catch(e){showToast('Bildirimler yüklenemedi','red');}
}

// ════ BAŞLANGIÇ ════
(async()=>{
  const token=localStorage.getItem('sb_access_token')||sessionStorage.getItem('sb_access_token');
  if(token)SB_TOKEN=token;
  await loadAll();
  setTimeout(()=>evrakBildirimKontrol().catch(()=>{}),3000);
  setInterval(()=>evrakBildirimKontrol().catch(()=>{}),15*60*1000);
})();
</script>
